name: Keep Supabase warm

# Supabase free-tier projects pause after ~7 days without DB activity.
# This workflow runs a cheap PostgREST query twice a week so the project
# stays active. Remove this workflow if/when we upgrade to Pro.

on:
  schedule:
    - cron: '0 9 * * 1,4' # Mon & Thu 09:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          curl -fsS \
            "${SUPABASE_URL}/rest/v1/tournees?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -o /dev/null \
            -w "HTTP %{http_code}\n"
